<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ssh-to-go</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='1' y='1' width='22' height='22' rx='5' fill='black'/%3E%3Cpolyline points='7 8 11 12 7 16' fill='none' stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cline x1='13' y1='16' x2='17' y2='16' stroke='white' stroke-width='2.2' stroke-linecap='round'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container login-container">
        <header>
            <h1>ssh-to-go</h1>
            <p class="subtitle">login</p>
        </header>

        <div class="login-card">
            <form id="login-form">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter admin password" autofocus required>
                <div id="login-error" class="login-error hidden"></div>
                <button type="submit" class="btn btn-primary login-btn">Sign In</button>
            </form>
        </div>
    </div>

    <script src="/static/js/login.js"></script>
</body>
</html>
