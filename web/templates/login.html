<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ssh-to-go</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='4 17 10 11 4 5'/%3E%3Cline x1='12' y1='19' x2='20' y2='19'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container login-container">
        <header>
            <h1>ssh-to-go</h1>
            <p class="subtitle">login</p>
        </header>

        <div class="login-card">
            <form id="login-form">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter admin password" autofocus required>
                <div id="login-error" class="login-error hidden"></div>
                <button type="submit" class="btn btn-primary login-btn">Sign In</button>
            </form>
        </div>
    </div>

    <script src="/static/js/login.js"></script>
</body>
</html>
