<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='1' y='1' width='22' height='22' rx='5' fill='black'/%3E%3Cpolyline points='7 8 11 12 7 16' fill='none' stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cline x1='13' y1='16' x2='17' y2='16' stroke='white' stroke-width='2.2' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="/static/app/app.css" />
<script>
  // Apply saved theme/accent/density before React boots to avoid a flash.
  (function(){
    var t = localStorage.getItem('sshtogo.theme') || 'dark';
    var a = localStorage.getItem('sshtogo.accent') || 'indigo';
    var d = localStorage.getItem('sshtogo.density') || 'balanced';
    var r = document.documentElement;
    r.dataset.theme = t; r.dataset.accent = a; r.dataset.density = d;
  })();
</script>
</head>
<body>
<div id="root"></div>

<script src="/static/vendor/react.production.min.js"></script>
<script src="/static/vendor/react-dom.production.min.js"></script>

<script src="/static/js/icons.js"></script>

<script src="/static/app/data.js"></script>
<script src="/static/app/icons.js"></script>
<script src="/static/app/primitives.js"></script>

<script src="/static/app/dashboard.js"></script>
<script src="/static/app/sessions.js"></script>
<script src="/static/app/hosts.js"></script>
<script src="/static/app/settings.js"></script>
<script src="/static/app/palette.js"></script>
<script src="/static/app/newsession.js"></script>
<script src="/static/app/tweaks.js"></script>
<script src="/static/app/app.js"></script>
</body>
</html>
