<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ssh-to-go</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-row">
                <div>
                    <h1>ssh-to-go</h1>
                    <p class="subtitle">terminal session manager</p>
                </div>
                <div class="header-actions">
                    <a href="/settings" class="btn" title="Settings">&#9881;</a>
                    <button id="add-host-btn" class="btn">+ Add Host</button>
                </div>
            </div>
        </header>

        <div id="pubkey-section" class="pubkey-section hidden">
            <div class="pubkey-header">
                <strong>Server Public Key</strong>
                <span class="pubkey-hint">Add this to <code>~/.ssh/authorized_keys</code> on your target hosts</span>
                <button class="btn btn-sm" id="copy-pubkey-btn">Copy</button>
            </div>
            <code id="pubkey-display" class="pubkey-code"></code>
        </div>

        <div id="host-list"></div>

        <div id="version-footer" style="position:fixed;bottom:8px;left:12px;font-size:11px;color:#555;"></div>

        <!-- New Session Modal -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div class="modal">
                <h3 id="modal-title">New Session</h3>
                <form id="modal-form">
                    <div id="modal-fields"></div>
                    <div class="modal-actions">
                        <button type="button" id="modal-cancel" class="btn">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="modal-submit">Create</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
