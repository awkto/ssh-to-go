<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>{{.Host}} / {{.Session}} — ssh-to-go</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='4 17 10 11 4 5'/%3E%3Cline x1='12' y1='19' x2='20' y2='19'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="/static/vendor/xterm.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #1a1a2e; overflow: hidden; }
        body {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
        }
        #toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            background: #16213e;
            color: #a0a0b0;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
        }
        #toolbar a { color: #7c83ff; text-decoration: none; }
        #toolbar a:hover { text-decoration: underline; }
        #toolbar .info { display: flex; gap: 16px; align-items: center; }
        #toolbar .status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #555; }
        #toolbar .status.connected { background: #4ade80; }
        #toolbar .status.disconnected { background: #f87171; }
        .btn-small {
            background: #2a2a4a;
            color: #ccc;
            border: 1px solid #444;
            padding: 3px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-small:hover { background: #3a3a5a; }

        /* Host badge — only visible on wide screens */
        .host-badge {
            display: none;
            font-style: italic;
            color: #6a6a8a;
            font-size: 12px;
            margin-left: 6px;
        }
        .host-badge::before { content: "["; }
        .host-badge::after  { content: "]"; }
        @media (min-width: 700px) {
            .host-badge { display: inline; }
        }

        /* Narrow/mobile: compact toolbar */
        @media (max-width: 600px) {
            .dash-text { display: none; }
            .dash-icon { display: inline; }
            #toolbar { padding: 4px 8px; }
            #toolbar .info { gap: 8px; }
        }
        @media (min-width: 601px) {
            .dash-icon { display: none; }
        }
        .toolbar-dropdown {
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 4px;
            background: #1e1e38;
            border: 1px solid #3a3a5a;
            border-radius: 6px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            z-index: 1000;
            min-width: 130px;
            overflow: hidden;
        }
        .toolbar-menu-item {
            display: block;
            width: 100%;
            padding: 10px 14px;
            background: none;
            border: none;
            color: #e0e0e8;
            font-size: 13px;
            text-align: left;
            cursor: pointer;
        }
        .toolbar-menu-item:active { background: #3a3a5a; }
        .toolbar-menu-divider { height: 1px; background: #3a3a5a; margin: 4px 0; }

        /* Theme picker */
        .theme-dropdown {
            right: auto; left: 0;
            max-height: 360px;
            overflow-y: auto;
            min-width: 200px;
            padding: 4px 0;
        }
        .theme-option {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 7px 12px;
            background: none;
            border: none;
            color: #e0e0e8;
            font-size: 13px;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
        }
        .theme-option:hover { background: #3a3a5a; }
        .theme-option.active { background: #2a2a5a; }
        .theme-option.active .theme-name { font-weight: 600; }
        .theme-swatches {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
        }
        .theme-swatch {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 2px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #terminal { flex: 1; min-height: 0; overflow: hidden; }

        /* Mobile keyboard toolbar — only shown on touch devices */
        #mobile-bar {
            display: none;
            background: #16213e;
            border-top: 1px solid #2a2a4a;
            padding: 6px 8px;
            gap: 6px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        @media (pointer: coarse) {
            #mobile-bar { display: flex; }
        }
        #mobile-bar button {
            background: #2a2a4a;
            color: #ccc;
            border: 1px solid #444;
            padding: 4px 7px;
            border-radius: 4px;
            font-size: 12px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            white-space: nowrap;
            flex-shrink: 0;
            cursor: pointer;
            touch-action: manipulation;
        }
        #mobile-bar button:active { background: #3a3a5a; }

        /* Scroll overlay buttons — only on touch devices */
        #scroll-overlay {
            display: none;
            position: absolute;
            right: 12px;
            bottom: 60px;
            flex-direction: column;
            gap: 6px;
            z-index: 9999;
        }
        .scroll-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(60, 60, 80, 0.45);
            color: #888;
            border: 1px solid #555;
            font-size: 16px;
            line-height: 40px;
            text-align: center;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
        }
        .scroll-btn:active { background: rgba(100, 100, 130, 0.8); color: #ccc; }

        /* Show scroll buttons only on touch/mobile devices */
        @media (pointer: coarse) {
            #scroll-overlay { display: flex; }
        }
        @media (max-width: 768px) {
            #scroll-overlay { display: flex; }
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <div class="info">
            <a href="/"><span class="dash-icon">&#9664;</span><span class="dash-text">← dashboard</span></a>
            <span id="session-label">{{.Host}} / {{.Session}}</span><span class="host-badge" id="host-badge">{{.Host}}</span>
            <span class="status" id="ws-status"></span>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
            <div style="position:relative;">
                <button class="btn-small" id="theme-btn" title="Terminal theme"><span id="theme-label">Theme</span></button>
                <div id="theme-dropdown" class="toolbar-dropdown theme-dropdown" style="display:none;"></div>
            </div>
            <span style="display:flex;gap:2px;align-items:center;">
                <button class="btn-small" id="zoom-out-btn" title="Decrease font size">A-</button>
                <button class="btn-small" id="zoom-reset-btn" title="Reset font size" style="min-width:28px"><span id="zoom-level">14</span></button>
                <button class="btn-small" id="zoom-in-btn" title="Increase font size">A+</button>
            </span>
            <div style="position:relative;">
                <button class="btn-small" id="toolbar-burger" title="More actions" style="font-size:18px;line-height:1;padding:3px 14px;">&#9776;</button>
                <div id="toolbar-menu" class="toolbar-dropdown" style="display:none;">
                    <button class="toolbar-menu-item" id="paste-btn">Paste</button>
                    <button class="toolbar-menu-item" id="rename-btn">Rename</button>
                    <button class="toolbar-menu-item" id="duplicate-btn">Duplicate</button>
                    <button class="toolbar-menu-item" id="handoff-btn">Handoff</button>
                    <div class="toolbar-menu-divider"></div>
                    <button class="toolbar-menu-item" id="ctrl-c-btn">Send Ctrl-C</button>
                    <button class="toolbar-menu-item" id="ctrl-d-btn">Send Ctrl-D</button>
                    <button class="toolbar-menu-item" id="ctrl-w-btn">Send Ctrl-W</button>
                </div>
            </div>
        </div>
    </div>
    <div id="terminal" style="position:relative;">
        <div id="scroll-overlay">
            <button id="scroll-up" class="scroll-btn">&#9650;</button>
            <button id="scroll-down" class="scroll-btn">&#9660;</button>
        </div>
    </div>
    <div id="mobile-bar">
        <button data-key="Tab">Tab</button>
        <button data-key="Escape">Esc</button>
        <button data-key="ArrowUp">↑</button>
        <button data-key="ArrowDown">↓</button>
        <button data-key="ArrowLeft">←</button>
        <button data-key="ArrowRight">→</button>
        <button data-mod="ctrl">Ctrl</button>
        <button data-key="/">/</button>
        <button data-key="|">|</button>
        <button data-key="~">~</button>
    </div>

    <script src="/static/vendor/xterm.min.js"></script>
    <script src="/static/vendor/xterm-addon-fit.min.js"></script>
    <script src="/static/vendor/xterm-addon-web-links.min.js"></script>
    <script src="/static/js/icons.js"></script>
    <script src="/static/js/terminal.js"></script>
    <script>
        initTerminal("{{.Host}}", "{{.Session}}");

        // Update favicon to match session/host icon
        (function() {
            var host = "{{.Host}}";
            var session = "{{.Session}}";

            function setFavicon(iconName, colorName) {
                if (!iconName || !window.APP_ICONS) return;
                var icon = window.APP_ICONS.find(function(i) { return i.name === iconName; });
                if (!icon) return;
                var hex = window.colorHex ? window.colorHex(colorName || "default") : "#3b82f6";
                var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="' + hex + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + icon.svg + '</svg>';
                var encoded = 'data:image/svg+xml,' + encodeURIComponent(svg).replace(/'/g, '%27');
                var link = document.querySelector('link[rel="icon"]');
                if (link) link.href = encoded;
            }

            // Load session icons from server, then set favicon
            window.loadSessionIcons(function() {
                var sessionIcon = window.getSessionIcon ? window.getSessionIcon(host, session) : null;
                var sessionColor = window.getSessionIconColor ? window.getSessionIconColor(host, session) : null;
                if (sessionIcon) {
                    setFavicon(sessionIcon, sessionColor);
                } else {
                    // Fall back to host icon
                    fetch('/api/hosts').then(function(r) { return r.json(); }).then(function(hosts) {
                        var h = hosts.find(function(x) { return x.config.name === host; });
                        if (h && (h.config.icon || h.config.icon_color)) {
                            setFavicon(h.config.icon || "terminal", h.config.icon_color || "default");
                        }
                    }).catch(function() {});
                }
            });

            // Update tab title based on settings
            fetch('/api/settings').then(function(r) { return r.json(); }).then(function(s) {
                var fmt = s.tab_title_format || "host-session";
                var title;
                switch (fmt) {
                    case "host-only":    title = host; break;
                    case "session-only": title = session; break;
                    case "session-host": title = session + " / " + host; break;
                    default:             title = host + " / " + session; break;
                }
                document.title = title;
                document.getElementById("session-label").textContent = title;
            }).catch(function() {});
        })();
    </script>
</body>
</html>
